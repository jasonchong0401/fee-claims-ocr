<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>费用报销系统 - 登录</title>
<link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="login-page">

<div class="login-container">
  <div class="logo">📄</div>
  <h1>费用报销 OCR 系统</h1>
  <p class="subtitle">请登录以继续使用</p>

  <div class="field">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名" autocomplete="username" autofocus>
  </div>

  <div class="field">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码" autocomplete="current-password">
  </div>

  <button class="btn btn-primary btn-lg btn-block" id="btnLogin" onclick="doLogin()" style="margin-top:8px;">
    <span class="spinner" id="spinner"></span> 登 录
  </button>

  <div class="status-msg error" id="errorMsg"></div>
  <div class="footer">首次使用？首个注册用户自动成为管理员</div>
</div>

<script src="/static/js/common.js"></script>
<script src="/static/js/login.js"></script>
</body>
</html>
