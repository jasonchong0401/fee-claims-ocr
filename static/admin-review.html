<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>审批管理 - 费用报销系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding-top: 52px;
  }

  /* ── Top Nav Bar ── */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px; background: #fff;
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .top-bar .brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 700; color: #1e293b; text-decoration: none;
  }
  .top-bar .brand .dot {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
  }
  .top-bar .nav-links { display: flex; align-items: center; gap: 4px; }
  .top-bar .nav-link {
    padding: 6px 14px; border-radius: 7px;
    font-size: 13px; font-weight: 500;
    color: #475569; text-decoration: none;
    transition: all .15s;
  }
  .top-bar .nav-link:hover { background: #f1f5f9; color: #1e293b; }
  .top-bar .nav-link.active { background: #eff6ff; color: #2563eb; font-weight: 600; }
  .top-bar .right-section { display: flex; align-items: center; gap: 6px; position: relative; }
  .top-bar .user-name { font-size: 13px; font-weight: 500; color: #334155; }
  .top-bar .role-tag { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 4px; }
  .role-tag.admin { background: #dbeafe; color: #2563eb; }
  .role-tag.user  { background: #f0fdf4; color: #16a34a; }
  .btn-gear {
    width: 32px; height: 32px; border: 1px solid #e2e8f0; border-radius: 8px;
    background: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #64748b; transition: all .15s; margin-left: 4px;
  }
  .btn-gear:hover { background: #f1f5f9; color: #334155; border-color: #cbd5e1; }
  .dropdown {
    display: none; position: absolute; top: 42px; right: 0;
    min-width: 160px; background: #fff; border: 1px solid #e2e8f0;
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    overflow: hidden; z-index: 200;
  }
  .dropdown.show { display: block; }
  .dropdown .item {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 10px 16px; border: none; background: none;
    font-size: 13px; color: #334155; cursor: pointer; text-align: left;
    transition: background .1s;
  }
  .dropdown .item:hover { background: #f8fafc; }
  .dropdown .item.danger { color: #dc2626; }
  .dropdown .item.danger:hover { background: #fef2f2; }
  .dropdown .divider { height: 1px; background: #e2e8f0; margin: 4px 0; }

  /* ── Main Content ── */
  .container { max-width: 960px; margin: 24px auto; padding: 0 20px 40px; }

  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-header h1 {
    font-size: 22px; font-weight: 700; color: #1e293b;
    display: flex; align-items: center; gap: 10px;
  }
  .page-header h1 .icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
  }

  /* ── Filter Tabs ── */
  .filter-tabs {
    display: flex; gap: 6px; margin-bottom: 20px;
  }
  .filter-tab {
    padding: 8px 18px; border-radius: 8px; border: 1px solid #d1d5db;
    background: #fff; font-size: 13px; font-weight: 500;
    color: #475569; cursor: pointer; transition: all .15s;
  }
  .filter-tab:hover { background: #f8fafc; border-color: #94a3b8; }
  .filter-tab.active { background: #eff6ff; color: #2563eb; border-color: #3b82f6; font-weight: 600; }
  .filter-tab .count {
    display: inline-block; margin-left: 6px; padding: 1px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 700;
    background: #e2e8f0; color: #64748b;
  }
  .filter-tab.active .count { background: #bfdbfe; color: #2563eb; }

  /* ── Status Message ── */
  .status-msg {
    display: none; margin-bottom: 16px; padding: 10px 14px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
  }
  .status-msg.show   { display: block; }
  .status-msg.success{ background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
  .status-msg.error  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
  .status-msg.info   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }

  /* ── Receipt Review Card ── */
  .review-card {
    background: #fff; border-radius: 14px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    margin-bottom: 20px; overflow: hidden;
  }
  .review-card.done { opacity: 0.5; pointer-events: none; }

  .review-card .card-body {
    display: flex; gap: 20px; padding: 24px;
  }
  @media (max-width: 700px) { .review-card .card-body { flex-direction: column; } }

  /* ── Image ── */
  .card-image {
    flex-shrink: 0; width: 260px;
    border-radius: 10px; overflow: hidden;
    background: #f8fafc; border: 1px solid #e8ecf1;
    display: flex; align-items: center; justify-content: center;
    min-height: 200px;
  }
  .card-image img {
    width: 100%; height: auto; max-height: 400px;
    object-fit: contain; cursor: pointer;
  }
  .card-image .no-img {
    text-align: center; color: #94a3b8; font-size: 13px;
    padding: 40px 20px;
  }

  /* ── Fields ── */
  .card-fields { flex: 1; min-width: 0; }
  .card-fields .field-row {
    display: flex; align-items: baseline; gap: 8px;
    padding: 6px 0; border-bottom: 1px solid #f1f5f9;
    font-size: 14px;
  }
  .field-row .f-label {
    flex-shrink: 0; width: 70px;
    font-size: 12px; font-weight: 500; color: #94a3b8;
  }
  .field-row .f-value { color: #1e293b; font-weight: 500; word-break: break-all; }
  .field-row .f-value.amount { font-size: 18px; font-weight: 700; color: #1e293b; }
  .field-row .f-value.error { color: #dc2626; font-size: 12px; }

  /* ── OCR text ── */
  .ocr-block {
    margin-top: 10px; padding: 10px 12px;
    background: #f8fafc; border: 1px solid #e2e8f0;
    border-radius: 8px; font-size: 12px; color: #64748b;
    white-space: pre-wrap; max-height: 100px; overflow-y: auto;
    font-family: "SF Mono", "Fira Code", monospace;
  }
  .ocr-block summary {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    font-size: 12px; font-weight: 500; color: #64748b;
    cursor: pointer; margin-bottom: 4px;
  }

  /* ── Action Bar ── */
  .action-bar {
    padding: 16px 24px;
    background: #f8fafc; border-top: 1px solid #e8ecf1;
    display: flex; align-items: flex-end; gap: 12px;
    flex-wrap: wrap;
  }
  .action-bar .comment-box {
    flex: 1; min-width: 200px;
    display: flex; flex-direction: column; gap: 4px;
  }
  .comment-box label {
    font-size: 12px; font-weight: 500; color: #64748b;
  }
  .comment-box textarea {
    height: 42px; padding: 8px 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 13px; color: #1e293b; resize: vertical;
    font-family: inherit; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .comment-box textarea:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }

  .btn {
    height: 42px; padding: 0 22px;
    border: none; border-radius: 9px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    transition: all .15s; white-space: nowrap;
  }
  .btn:disabled { opacity: 0.45; cursor: not-allowed; }
  .btn-approve {
    background: #16a34a; color: #fff;
    box-shadow: 0 2px 6px rgba(22,163,74,0.25);
  }
  .btn-approve:hover:not(:disabled) {
    box-shadow: 0 4px 12px rgba(22,163,74,0.35);
    transform: translateY(-1px);
  }
  .btn-reject {
    background: #dc2626; color: #fff;
    box-shadow: 0 2px 6px rgba(220,38,38,0.2);
  }
  .btn-reject:hover:not(:disabled) {
    box-shadow: 0 4px 12px rgba(220,38,38,0.3);
    transform: translateY(-1px);
  }
  .btn-update {
    background: #ea580c; color: #fff;
    box-shadow: 0 2px 6px rgba(234,88,12,0.2);
  }
  .btn-update:hover:not(:disabled) {
    box-shadow: 0 4px 12px rgba(234,88,12,0.3);
    transform: translateY(-1px);
  }

  /* ── Spinner ── */
  .spinner-inline {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-right: 6px; vertical-align: middle;
  }
  .spinner-inline.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Badge ── */
  .badge {
    display: inline-block; font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 5px;
  }
  .badge.pending        { background: #eff6ff; color: #2563eb; }
  .badge.approved       { background: #f0fdf4; color: #16a34a; }
  .badge.rejected       { background: #fef2f2; color: #dc2626; }
  .badge.pending_update { background: #fff7ed; color: #ea580c; }

  /* ── Empty ── */
  .empty-state {
    text-align: center; padding: 80px 20px; color: #94a3b8;
  }
  .empty-state .empty-icon { font-size: 52px; margin-bottom: 14px; }
  .empty-state .empty-text { font-size: 16px; font-weight: 500; }
  .empty-state .empty-sub  { font-size: 13px; margin-top: 4px; }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 24px; padding-bottom: 16px;
  }
  .pagination .btn-page {
    height: 36px; min-width: 36px; padding: 0 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    background: #fff; font-size: 13px; font-weight: 500;
    color: #475569; cursor: pointer; transition: all .15s;
  }
  .pagination .btn-page:hover:not(:disabled) { background: #f8fafc; border-color: #3b82f6; }
  .pagination .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination .btn-page.active { background: #eff6ff; color: #2563eb; border-color: #3b82f6; font-weight: 600; }
  .pagination .page-info { font-size: 13px; color: #64748b; padding: 0 8px; }

  /* ── Image Modal ── */
  .img-modal {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.85);
    align-items: center; justify-content: center;
    cursor: pointer;
  }
  .img-modal.show { display: flex; }
  .img-modal img {
    max-width: 92vw; max-height: 92vh;
    border-radius: 6px; box-shadow: 0 8px 40px rgba(0,0,0,0.3);
  }

  /* ── Modal (profile / password) ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(15,23,42,0.4);
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 14px;
    padding: 28px 30px 24px;
    width: 380px; max-width: 90vw;
    box-shadow: 0 16px 48px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 17px; color: #1e293b; margin-bottom: 20px; }
  .modal .field { margin-bottom: 14px; }
  .modal .field label {
    display: block; font-size: 13px; font-weight: 500;
    color: #475569; margin-bottom: 5px;
  }
  .modal .field input {
    width: 100%; height: 40px; padding: 0 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 14px; color: #1e293b;
  }
  .modal .btn-row { display: flex; gap: 12px; margin-top: 20px; }
  .modal .btn-row .btn { flex: 1; height: 42px; border-radius: 9px; font-size: 14px; font-weight: 600; }
</style>
</head>
<body>

<!-- ═══════════ Top Nav Bar ═══════════ -->
<div class="top-bar">
  <div style="display:flex;align-items:center;gap:20px;">
    <a class="brand" href="/upload">
      <span class="dot">📄</span> 费用报销系统
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/upload">📷 上传票据</a>
      <a class="nav-link" href="/my-receipts">📋 我的报销</a>
      <a class="nav-link active" href="/admin/review">✅ 审批管理</a>
    </div>
  </div>
  <div class="right-section">
    <span class="user-name" id="displayUsername">-</span>
    <span class="role-tag admin" id="displayRole">admin</span>
    <button class="btn-gear" onclick="toggleDropdown()" title="设置">⚙</button>
    <div class="dropdown" id="dropdown">
      <button class="item" onclick="openProfileModal()">👤 个人信息</button>
      <button class="item" onclick="openPasswordModal()">🔒 修改密码</button>
      <div class="divider"></div>
      <button class="item danger" onclick="logout()">🚪 退出登录</button>
    </div>
  </div>
</div>

<!-- ═══════════ Profile Modal ═══════════ -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <h3>个人信息</h3>
    <div class="field"><label>用户名</label><input type="text" id="pfUsername" disabled></div>
    <div class="field"><label>工号</label><input type="text" id="pfEmployeeId" disabled></div>
    <div class="field"><label>角色</label><input type="text" id="pfRole" disabled></div>
    <div class="field"><label>部门</label><input type="text" id="pfDept"></div>
    <div class="field"><label>邮箱</label><input type="email" id="pfEmail"></div>
    <div class="btn-row">
      <button class="btn btn-outline" style="background:#fff;color:#475569;border:1px solid #d1d5db;" onclick="closeProfileModal()">取消</button>
      <button class="btn" style="background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<!-- ═══════════ Password Modal ═══════════ -->
<div class="modal-overlay" id="passwordModal">
  <div class="modal">
    <h3>修改密码</h3>
    <div class="field"><label>旧密码</label><input type="password" id="pwOld"></div>
    <div class="field"><label>新密码</label><input type="password" id="pwNew"></div>
    <div class="field"><label>确认新密码</label><input type="password" id="pwConfirm"></div>
    <p class="status-msg" id="pwMsg"></p>
    <div class="btn-row">
      <button class="btn btn-outline" style="background:#fff;color:#475569;border:1px solid #d1d5db;" onclick="closePasswordModal()">取消</button>
      <button class="btn" style="background:linear-gradient(135deg,#2563eb,#3b82f6);color:#fff;" onclick="changePassword()">确认修改</button>
    </div>
  </div>
</div>

<!-- ═══════════ Image Modal ═══════════ -->
<div class="img-modal" id="imgModal" onclick="this.classList.remove('show')">
  <img id="imgModalSrc" src="" alt="票据原图">
</div>

<!-- ═══════════ Main Content ═══════════ -->
<div class="container">

  <div class="page-header">
    <h1><span class="icon">✅</span> 审批管理</h1>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs" id="filterTabs">
    <button class="filter-tab active" data-status="pending" onclick="switchTab('pending')">⏳ 审批中 <span class="count" id="countPending">-</span></button>
    <button class="filter-tab" data-status="approved" onclick="switchTab('approved')">✅ 已通过 <span class="count" id="countApproved">-</span></button>
    <button class="filter-tab" data-status="rejected" onclick="switchTab('rejected')">❌ 已拒绝 <span class="count" id="countRejected">-</span></button>
    <button class="filter-tab" data-status="pending_update" onclick="switchTab('pending_update')">📝 待更新 <span class="count" id="countPendingUpdate">-</span></button>
  </div>

  <!-- Status -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- Review Cards -->
  <div id="reviewList"></div>

  <!-- Empty -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">🎉</div>
    <div class="empty-text">没有待处理的报销单</div>
    <div class="empty-sub">所有报销单已处理完毕</div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination" style="display:none;"></div>

</div>

<script>
// ── Auth Guard (admin only) ──
const TOKEN = localStorage.getItem('token');
const USERNAME = localStorage.getItem('username');
const ROLE = localStorage.getItem('role');

if (!TOKEN) { window.location.href = '/'; }
if (ROLE !== 'admin') { window.location.href = '/upload'; }

document.getElementById('displayUsername').textContent = USERNAME || '-';

// ── State ──
let currentTab = 'pending';
let currentPage = 1;
const PAGE_SIZE = 10;

// ── Dropdown ──
function toggleDropdown() { document.getElementById('dropdown').classList.toggle('show'); }
document.addEventListener('click', e => {
  if (!e.target.closest('.right-section')) document.getElementById('dropdown').classList.remove('show');
});

// ── Profile Modal ──
async function openProfileModal() {
  document.getElementById('dropdown').classList.remove('show');
  try {
    const resp = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    const json = await resp.json();
    if (json.code === 0 && json.data) {
      const d = json.data;
      document.getElementById('pfUsername').value = d.username || '';
      document.getElementById('pfEmployeeId').value = d.employee_id || '';
      document.getElementById('pfRole').value = d.role || '';
      document.getElementById('pfDept').value = d.department || '';
      document.getElementById('pfEmail').value = d.email || '';
    }
  } catch (e) {}
  document.getElementById('profileModal').classList.add('show');
}
function closeProfileModal() { document.getElementById('profileModal').classList.remove('show'); }
async function saveProfile() {
  const body = { email: document.getElementById('pfEmail').value.trim() || null, department: document.getElementById('pfDept').value.trim() || null };
  try {
    const resp = await fetch('/api/me', { method:'PUT', headers:{'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`}, body:JSON.stringify(body) });
    const json = await resp.json();
    if (json.code === 0) { closeProfileModal(); showStatus('success','个人信息已更新'); }
  } catch(e) { showStatus('error','保存失败'); }
}

// ── Password Modal ──
function openPasswordModal() {
  document.getElementById('dropdown').classList.remove('show');
  document.getElementById('pwOld').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwConfirm').value = '';
  document.getElementById('pwMsg').className = 'status-msg'; document.getElementById('pwMsg').textContent = '';
  document.getElementById('passwordModal').classList.add('show');
}
function closePasswordModal() { document.getElementById('passwordModal').classList.remove('show'); }
async function changePassword() {
  const o=document.getElementById('pwOld').value, n=document.getElementById('pwNew').value, c=document.getElementById('pwConfirm').value;
  const msg=document.getElementById('pwMsg');
  if(!o||!n){msg.className='status-msg show error';msg.textContent='请填写所有字段';return;}
  if(n.length<6){msg.className='status-msg show error';msg.textContent='新密码至少6位';return;}
  if(n!==c){msg.className='status-msg show error';msg.textContent='两次新密码不一致';return;}
  try {
    const r=await fetch('/api/me/password',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`},body:JSON.stringify({old_password:o,new_password:n})});
    const j=await r.json();
    if(j.code===0){msg.className='status-msg show success';msg.textContent='密码修改成功';setTimeout(closePasswordModal,1200);}
    else{msg.className='status-msg show error';msg.textContent=j.msg||'修改失败';}
  }catch(e){msg.className='status-msg show error';msg.textContent='网络异常';}
}

function logout() {
  localStorage.removeItem('token'); localStorage.removeItem('username');
  localStorage.removeItem('employee_id'); localStorage.removeItem('role');
  window.location.href = '/';
}

// ── Tab Switch ──
function switchTab(status) {
  currentTab = status;
  currentPage = 1;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.toggle('active', t.dataset.status === status));
  loadReviews();
}

// ── Load Reviews ──
async function loadReviews() {
  const listEl = document.getElementById('reviewList');
  const emptyEl = document.getElementById('emptyState');
  const pagEl = document.getElementById('pagination');

  listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">⏳ 加载中...</div>';
  pagEl.style.display = 'none'; emptyEl.style.display = 'none';
  hideStatus();

  const url = `/api/admin/review-queue?approval_status=${currentTab}&page=${currentPage}&page_size=${PAGE_SIZE}`;

  try {
    const resp = await fetch(url, { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    const json = await resp.json();
    if (!resp.ok || json.code !== 0) {
      showStatus('error', json.msg || '加载失败');
      listEl.innerHTML = ''; emptyEl.style.display = 'block';
      return;
    }

    const receipts = json.data || [];
    await updateCounts();

    if (receipts.length === 0) {
      listEl.innerHTML = ''; emptyEl.style.display = 'block';
      return;
    }

    listEl.innerHTML = receipts.map((r, i) => renderCard(r, i)).join('');
    renderPagination(json.total || 0);
  } catch (err) {
    showStatus('error', '网络异常：' + err.message);
    listEl.innerHTML = ''; emptyEl.style.display = 'block';
  }
}

// ── Update tab counts ──
async function updateCounts() {
  const statuses = ['pending', 'approved', 'rejected', 'pending_update'];
  for (const s of statuses) {
    try {
      const resp = await fetch(`/api/admin/review-queue?approval_status=${s}&page_size=1`, {
        headers: { 'Authorization': `Bearer ${TOKEN}` }
      });
      const json = await resp.json();
      const el = document.getElementById('count' + s.charAt(0).toUpperCase() + s.slice(1).replace('_',''));
      if (el) el.textContent = json.total || 0;
    } catch(e) {}
  }
}

// ── Render Card ──
function renderCard(r, idx) {
  const created = r.created_at ? r.created_at.slice(0, 10) : '-';
  const time = r.created_at ? r.created_at.slice(11, 16) : '';
  const amount = r.total_amount != null ? r.total_amount.toFixed(2) : '-.--';
  const ocrStatus = {0:'待处理',1:'已提取','-1':'提取失败'}[r.status] || `状态${r.status}`;

  // Image URL: strip "uploads/receipts/" prefix, use /uploads/ mount
  let imgHtml = '<div class="no-img">📷<br>无票据图片</div>';
  if (r.image_path) {
    const url = '/uploads/' + r.image_path.replace(/^uploads\/receipts\//, '');
    imgHtml = `<img src="${escHtml(url)}" alt="票据图片" onclick="event.stopPropagation();openImage('${escHtml(url)}')" onerror="this.parentElement.innerHTML='<div class=no-img>📷<br>图片加载失败</div>'">`;
  }

  const statusLabel = {pending:'审批中',approved:'已通过',rejected:'已拒绝',pending_update:'待更新'}[r.approval_status]||r.approval_status;

  return `
  <div class="review-card" id="card-${idx}">
    <div class="card-body">
      <div class="card-image">${imgHtml}</div>
      <div class="card-fields">
        <div class="field-row"><span class="f-label">状态</span><span class="f-value"><span class="badge ${r.approval_status}">${statusLabel}</span></span></div>
        <div class="field-row"><span class="f-label">报销人</span><span class="f-value">${escHtml(r.applicant || '-')}</span></div>
        <div class="field-row"><span class="f-label">类型</span><span class="f-value">${escHtml(r.expense_type || '-')}</span></div>
        <div class="field-row"><span class="f-label">商户</span><span class="f-value">${escHtml(r.merchant || '-')}</span></div>
        <div class="field-row"><span class="f-label">金额</span><span class="f-value amount">¥${amount}</span></div>
        <div class="field-row"><span class="f-label">人数</span><span class="f-value">${r.head_count || 1} 人</span></div>
        <div class="field-row"><span class="f-label">提交人</span><span class="f-value">${escHtml(r.employee_id || '-')}</span></div>
        <div class="field-row"><span class="f-label">提交时间</span><span class="f-value">${created} ${time}</span></div>
        <div class="field-row"><span class="f-label">OCR</span><span class="f-value">${ocrStatus}</span></div>
        <div class="field-row"><span class="f-label">UUID</span><span class="f-value" style="font-size:11px;font-family:monospace;">${r.uuid}</span></div>
        ${r.error_message ? `<div class="field-row"><span class="f-label">错误</span><span class="f-value error">${escHtml(r.error_message)}</span></div>` : ''}
        ${r.review_comment ? `<div class="field-row"><span class="f-label">审批意见</span><span class="f-value" style="color:#16a34a;">${escHtml(r.review_comment)}</span></div>` : ''}
        ${r.ocr_raw_text ? `<details class="ocr-block"><summary>OCR 原始文本</summary>${escHtml(r.ocr_raw_text)}</details>` : ''}
      </div>
    </div>
    ${currentTab === 'pending' ? `
    <div class="action-bar">
      <div class="comment-box">
        <label>审批意见（可选）</label>
        <textarea id="comment-${idx}" placeholder="输入审批意见..."></textarea>
      </div>
      <button class="btn btn-approve" id="btnApprove-${idx}" onclick="doApprove('${r.uuid}', 'approved', ${idx})">
        <span class="spinner-inline" id="spinApprove-${idx}"></span>✅ 批准
      </button>
      <button class="btn btn-update" id="btnUpdate-${idx}" onclick="doApprove('${r.uuid}', 'pending_update', ${idx})">
        <span class="spinner-inline" id="spinUpdate-${idx}"></span>📝 需修改
      </button>
      <button class="btn btn-reject" id="btnReject-${idx}" onclick="doApprove('${r.uuid}', 'rejected', ${idx})">
        <span class="spinner-inline" id="spinReject-${idx}"></span>❌ 拒绝
      </button>
    </div>` : ''}
  </div>`;
}

// ── Approve / Reject ──
async function doApprove(uuid, status, idx) {
  const comment = document.getElementById('comment-' + idx)?.value.trim() || '';
  const card = document.getElementById('card-' + idx);

  // Disable buttons, show spinner
  const spinMap = { approved: 'Approve', rejected: 'Reject', pending_update: 'Update' };
  const spinId = 'spin' + spinMap[status] + '-' + idx;
  const spinEl = document.getElementById(spinId);
  if (spinEl) spinEl.classList.add('show');
  card.querySelectorAll('.btn').forEach(b => b.disabled = true);

  try {
    const resp = await fetch(`/api/receipt/${uuid}/approve`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
      body: JSON.stringify({ approval_status: status, comment: comment || null }),
    });
    const json = await resp.json();
    if (resp.ok && json.code === 0) {
      card.classList.add('done');
      // Reload after short delay
      setTimeout(() => loadReviews(), 600);
      showStatus('success', `报销单已${status==='approved'?'批准':status==='rejected'?'拒绝':'标记为待更新'}`);
    } else {
      showStatus('error', json.msg || '操作失败');
      if (spinEl) spinEl.classList.remove('show');
      card.querySelectorAll('.btn').forEach(b => b.disabled = false);
    }
  } catch (err) {
    showStatus('error', '网络异常：' + err.message);
    if (spinEl) spinEl.classList.remove('show');
    card.querySelectorAll('.btn').forEach(b => b.disabled = false);
  }
}

// ── Image Modal ──
function openImage(url) {
  document.getElementById('imgModalSrc').src = url;
  document.getElementById('imgModal').classList.add('show');
}

// ── Pagination ──
function renderPagination(total) {
  const pagEl = document.getElementById('pagination');
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) { pagEl.style.display = 'none'; return; }
  pagEl.style.display = 'flex';

  let html = `<button class="btn-page" onclick="goPage(${currentPage-1})" ${currentPage<=1?'disabled':''}>‹ 上一页</button>`;
  const maxB = 5;
  let s = Math.max(1, currentPage - Math.floor(maxB/2));
  let e = Math.min(totalPages, s + maxB - 1);
  if (e - s < maxB - 1) s = Math.max(1, e - maxB + 1);
  if (s > 1) { html += `<button class="btn-page" onclick="goPage(1)">1</button>`; if (s>2) html += '<span class="page-info">...</span>'; }
  for (let p=s; p<=e; p++) html += `<button class="btn-page ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
  if (e < totalPages) { if (e<totalPages-1) html += '<span class="page-info">...</span>'; html += `<button class="btn-page" onclick="goPage(${totalPages})">${totalPages}</button>`; }
  html += `<button class="btn-page" onclick="goPage(${currentPage+1})" ${currentPage>=totalPages?'disabled':''}>下一页 ›</button>`;
  pagEl.innerHTML = html;
}

function goPage(p) { currentPage = p; loadReviews(); window.scrollTo({top:0,behavior:'smooth'}); }

// ── Helpers ──
function escHtml(s) { if(!s)return''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function showStatus(type, msg) { const el=document.getElementById('statusMsg'); el.className=`status-msg show ${type}`; el.textContent=msg; }
function hideStatus() { const el=document.getElementById('statusMsg'); el.className='status-msg'; el.textContent=''; }

// ── Init ──
loadReviews();
</script>
</body>
</html>
