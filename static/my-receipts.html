<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的报销 - 费用报销系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    padding-top: 52px;
  }

  /* ── Top Nav Bar ── */
  .top-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    height: 52px;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    box-shadow: 0 1px 4px rgba(0,0,0,0.04);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 24px;
  }
  .top-bar .brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 700; color: #1e293b;
    text-decoration: none;
  }
  .top-bar .brand .dot {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
  }
  .top-bar .nav-links {
    display: flex; align-items: center; gap: 4px;
  }
  .top-bar .nav-link {
    padding: 6px 14px;
    border-radius: 7px;
    font-size: 13px; font-weight: 500;
    color: #475569; text-decoration: none;
    transition: all .15s;
  }
  .top-bar .nav-link:hover { background: #f1f5f9; color: #1e293b; }
  .top-bar .nav-link.active { background: #eff6ff; color: #2563eb; font-weight: 600; }

  .top-bar .right-section {
    display: flex; align-items: center; gap: 6px;
    position: relative;
  }
  .top-bar .user-name {
    font-size: 13px; font-weight: 500; color: #334155;
    cursor: default;
  }
  .top-bar .role-tag {
    font-size: 10px; font-weight: 600;
    padding: 2px 7px; border-radius: 4px;
  }
  .role-tag.admin { background: #dbeafe; color: #2563eb; }
  .role-tag.user  { background: #f0fdf4; color: #16a34a; }

  .btn-gear {
    width: 32px; height: 32px;
    border: 1px solid #e2e8f0; border-radius: 8px;
    background: #fff; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; color: #64748b;
    transition: all .15s;
    margin-left: 4px;
  }
  .btn-gear:hover { background: #f1f5f9; color: #334155; border-color: #cbd5e1; }

  .dropdown {
    display: none; position: absolute;
    top: 42px; right: 0;
    min-width: 160px;
    background: #fff; border: 1px solid #e2e8f0;
    border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    overflow: hidden; z-index: 200;
  }
  .dropdown.show { display: block; }
  .dropdown .item {
    display: flex; align-items: center; gap: 8px;
    width: 100%; padding: 10px 16px;
    border: none; background: none;
    font-size: 13px; color: #334155; cursor: pointer;
    text-align: left;
    transition: background .1s;
  }
  .dropdown .item:hover { background: #f8fafc; }
  .dropdown .item.danger { color: #dc2626; }
  .dropdown .item.danger:hover { background: #fef2f2; }
  .dropdown .divider { height: 1px; background: #e2e8f0; margin: 4px 0; }

  /* ── Main Content ── */
  .container {
    max-width: 900px;
    margin: 24px auto;
    padding: 0 20px;
  }

  /* ── Page Header ── */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .page-header h1 {
    font-size: 22px; font-weight: 700; color: #1e293b;
    display: flex; align-items: center; gap: 10px;
  }
  .page-header h1 .icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    border-radius: 10px;
    display: inline-flex; align-items: center; justify-content: center;
    color: #fff; font-size: 18px;
  }

  /* ── Search Bar ── */
  .search-bar {
    background: #fff;
    border-radius: 12px;
    padding: 16px 20px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .search-bar label {
    font-size: 13px; font-weight: 500; color: #475569;
    white-space: nowrap;
  }
  .search-bar input[type="date"] {
    height: 38px; padding: 0 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 14px; color: #1e293b;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  .search-bar input[type="date"]:focus {
    border-color: #3b82f6;
    box-shadow: 0 0 0 3px rgba(59,130,246,0.1);
  }
  .btn {
    height: 38px; padding: 0 18px;
    border: none; border-radius: 8px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: all .15s;
  }
  .btn-primary {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: #fff;
    box-shadow: 0 2px 6px rgba(37,99,235,0.2);
  }
  .btn-primary:hover { box-shadow: 0 4px 12px rgba(37,99,235,0.3); transform: translateY(-1px); }
  .btn-outline {
    background: #fff; color: #475569;
    border: 1px solid #d1d5db;
  }
  .btn-outline:hover { background: #f8fafc; }

  /* ── Status Message ── */
  .status-msg {
    display: none;
    margin-bottom: 16px; padding: 10px 14px;
    border-radius: 8px; font-size: 13px; font-weight: 500;
  }
  .status-msg.show   { display: block; }
  .status-msg.info   { background: #eff6ff; color: #2563eb; border: 1px solid #bfdbfe; }
  .status-msg.error  { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }

  /* ── Receipt Card List ── */
  .receipt-list {
    display: flex; flex-direction: column; gap: 10px;
  }

  .receipt-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 8px rgba(0,0,0,0.04);
    padding: 18px 22px;
    cursor: pointer;
    transition: all .15s;
    border: 1px solid transparent;
  }
  .receipt-card:hover {
    border-color: #bfdbfe;
    box-shadow: 0 2px 16px rgba(37,99,235,0.08);
  }
  .receipt-card.expanded {
    border-color: #3b82f6;
    box-shadow: 0 2px 20px rgba(37,99,235,0.1);
  }

  .receipt-row {
    display: flex; align-items: center; gap: 16px;
  }
  .receipt-row .col-date {
    width: 95px; flex-shrink: 0;
    font-size: 13px; color: #64748b;
  }
  .receipt-row .col-merchant {
    flex: 1; min-width: 0;
    font-size: 15px; font-weight: 600; color: #1e293b;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .receipt-row .col-type {
    width: 72px; flex-shrink: 0; text-align: center;
    font-size: 12px; color: #64748b;
    background: #f1f5f9; padding: 3px 8px; border-radius: 5px;
  }
  .receipt-row .col-amount {
    width: 100px; flex-shrink: 0; text-align: right;
    font-size: 16px; font-weight: 700; color: #1e293b;
    font-variant-numeric: tabular-nums;
  }
  .receipt-row .col-status {
    width: 80px; flex-shrink: 0; text-align: center;
  }
  .receipt-row .col-arrow {
    width: 20px; flex-shrink: 0; text-align: center;
    font-size: 12px; color: #94a3b8;
    transition: transform .2s;
  }
  .receipt-card.expanded .col-arrow { transform: rotate(180deg); }

  /* ── Status Badges ── */
  .badge {
    display: inline-block;
    font-size: 12px; font-weight: 600;
    padding: 3px 10px; border-radius: 5px;
  }
  .badge.pending        { background: #eff6ff; color: #2563eb; }
  .badge.approved       { background: #f0fdf4; color: #16a34a; }
  .badge.rejected       { background: #fef2f2; color: #dc2626; }
  .badge.pending_update { background: #fff7ed; color: #ea580c; }

  /* ── Expanded Detail ── */
  .receipt-detail {
    display: none;
    margin-top: 16px; padding-top: 16px;
    border-top: 1px solid #e8ecf1;
  }
  .receipt-card.expanded .receipt-detail { display: block; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  @media (max-width: 500px) { .detail-grid { grid-template-columns: 1fr; } }

  .detail-item { display: flex; flex-direction: column; gap: 4px; }
  .detail-item .d-label {
    font-size: 12px; font-weight: 500; color: #94a3b8; text-transform: uppercase;
  }
  .detail-item .d-value {
    font-size: 14px; color: #1e293b; font-weight: 500;
    word-break: break-all;
  }
  .detail-item.full { grid-column: 1 / -1; }

  .ocr-raw {
    margin-top: 4px; padding: 10px 12px;
    background: #f8fafc; border: 1px solid #e2e8f0;
    border-radius: 6px; font-size: 12px; color: #64748b;
    white-space: pre-wrap; max-height: 120px; overflow-y: auto;
    font-family: "SF Mono", "Fira Code", monospace;
  }

  /* ── Pagination ── */
  .pagination {
    display: flex; align-items: center; justify-content: center;
    gap: 8px; margin-top: 24px; padding-bottom: 32px;
  }
  .pagination .btn-page {
    height: 36px; min-width: 36px; padding: 0 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    background: #fff; font-size: 13px; font-weight: 500;
    color: #475569; cursor: pointer;
    transition: all .15s;
  }
  .pagination .btn-page:hover:not(:disabled) { background: #f8fafc; border-color: #3b82f6; }
  .pagination .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
  .pagination .btn-page.active { background: #eff6ff; color: #2563eb; border-color: #3b82f6; font-weight: 600; }
  .pagination .page-info {
    font-size: 13px; color: #64748b; padding: 0 8px;
  }

  /* ── Empty State ── */
  .empty-state {
    text-align: center; padding: 60px 20px; color: #94a3b8;
  }
  .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state .empty-text { font-size: 15px; font-weight: 500; }
  .empty-state .empty-sub  { font-size: 13px; margin-top: 4px; }

  /* ── Spinner ── */
  .spinner {
    display: none; width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .6s linear infinite;
    margin-right: 8px;
  }
  .spinner.show { display: inline-block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Modal ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(15,23,42,0.4);
    align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff; border-radius: 14px;
    padding: 28px 30px 24px;
    width: 380px; max-width: 90vw;
    box-shadow: 0 16px 48px rgba(0,0,0,0.15);
  }
  .modal h3 { font-size: 17px; color: #1e293b; margin-bottom: 20px; }
  .modal .field { margin-bottom: 14px; }
  .modal .field label {
    display: block; font-size: 13px; font-weight: 500;
    color: #475569; margin-bottom: 5px;
  }
  .modal .field input {
    width: 100%; height: 40px; padding: 0 12px;
    border: 1px solid #d1d5db; border-radius: 8px;
    font-size: 14px; color: #1e293b;
  }
  .modal .btn-row {
    display: flex; gap: 12px; margin-top: 20px;
  }
  .modal .btn-row .btn { flex: 1; height: 42px; }
</style>
</head>
<body>

<!-- ═══════════ Top Nav Bar ═══════════ -->
<div class="top-bar">
  <div style="display:flex;align-items:center;gap:20px;">
    <a class="brand" href="/upload">
      <span class="dot">📄</span> 费用报销系统
    </a>
    <div class="nav-links">
      <a class="nav-link" href="/upload">📷 上传票据</a>
      <a class="nav-link active" href="/my-receipts">📋 我的报销</a>
      <a class="nav-link" id="navAdminReview" href="/admin/review" style="display:none;">✅ 审批管理</a>
    </div>
  </div>
  <div class="right-section">
    <span class="user-name" id="displayUsername">-</span>
    <span class="role-tag" id="displayRole"></span>
    <button class="btn-gear" id="btnGear" onclick="toggleDropdown()" title="设置">⚙</button>
    <div class="dropdown" id="dropdown">
      <button class="item" onclick="openProfileModal()">👤 个人信息</button>
      <button class="item" onclick="openPasswordModal()">🔒 修改密码</button>
      <div class="divider"></div>
      <button class="item danger" onclick="logout()">🚪 退出登录</button>
    </div>
  </div>
</div>

<!-- ═══════════ Profile Modal ═══════════ -->
<div class="modal-overlay" id="profileModal">
  <div class="modal">
    <h3>个人信息</h3>
    <div class="field"><label>用户名</label><input type="text" id="pfUsername" disabled></div>
    <div class="field"><label>工号</label><input type="text" id="pfEmployeeId" disabled></div>
    <div class="field"><label>角色</label><input type="text" id="pfRole" disabled></div>
    <div class="field"><label>部门</label><input type="text" id="pfDept"></div>
    <div class="field"><label>邮箱</label><input type="email" id="pfEmail"></div>
    <div class="field"><label>入职日期</label><input type="text" id="pfStartDate" disabled></div>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closeProfileModal()">取消</button>
      <button class="btn btn-primary" onclick="saveProfile()">保存</button>
    </div>
  </div>
</div>

<!-- ═══════════ Password Modal ═══════════ -->
<div class="modal-overlay" id="passwordModal">
  <div class="modal">
    <h3>修改密码</h3>
    <div class="field"><label>旧密码</label><input type="password" id="pwOld" placeholder="请输入旧密码"></div>
    <div class="field"><label>新密码</label><input type="password" id="pwNew" placeholder="至少6位"></div>
    <div class="field"><label>确认新密码</label><input type="password" id="pwConfirm" placeholder="再次输入新密码"></div>
    <p class="status-msg" id="pwMsg"></p>
    <div class="btn-row">
      <button class="btn btn-outline" onclick="closePasswordModal()">取消</button>
      <button class="btn btn-primary" onclick="changePassword()">确认修改</button>
    </div>
  </div>
</div>

<!-- ═══════════ Main Content ═══════════ -->
<div class="container">

  <div class="page-header">
    <h1><span class="icon">📋</span> 我的报销</h1>
  </div>

  <!-- Search Bar -->
  <div class="search-bar">
    <label for="searchDate">📅 日期筛选：</label>
    <input type="date" id="searchDate">
    <button class="btn btn-primary" onclick="searchByDate()">🔍 搜索</button>
    <button class="btn btn-outline" onclick="clearSearch()">✕ 清除</button>
  </div>

  <!-- Status -->
  <div class="status-msg" id="statusMsg"></div>

  <!-- Receipt List -->
  <div class="receipt-list" id="receiptList"></div>

  <!-- Empty State -->
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="empty-icon">📭</div>
    <div class="empty-text">暂无报销记录</div>
    <div class="empty-sub">上传票据后将在这里显示</div>
  </div>

  <!-- Pagination -->
  <div class="pagination" id="pagination" style="display:none;"></div>

</div>

<script>
// ── Auth Guard ──
const TOKEN = localStorage.getItem('token');
const USERNAME = localStorage.getItem('username');
const ROLE = localStorage.getItem('role');

if (!TOKEN) { window.location.href = '/'; }

// Init top bar
document.getElementById('displayUsername').textContent = USERNAME || '-';
const tag = document.getElementById('displayRole');
tag.textContent = ROLE || '';
tag.className = 'role-tag ' + (ROLE === 'admin' ? 'admin' : 'user');

// Show admin link for admin users
if (ROLE === 'admin') {
  const a = document.getElementById('navAdminReview');
  if (a) a.style.display = '';
}

// ── State ──
let currentPage = 1;
let currentDate = '';
const PAGE_SIZE = 20;

// ── Status Labels ──
const STATUS_MAP = {
  pending:        { label: '审批中', cls: 'badge pending' },
  approved:       { label: '已通过', cls: 'badge approved' },
  rejected:       { label: '已拒绝', cls: 'badge rejected' },
  pending_update: { label: '待更新', cls: 'badge pending_update' },
};
const OCR_STATUS_MAP = { 0: '待处理', 1: '已提取', '-1': '提取失败' };

function statusBadge(approvalStatus) {
  const s = STATUS_MAP[approvalStatus] || { label: approvalStatus || '未知', cls: 'badge' };
  return `<span class="${s.cls}">${s.label}</span>`;
}

// ── Dropdown ──
function toggleDropdown() {
  document.getElementById('dropdown').classList.toggle('show');
}
document.addEventListener('click', e => {
  if (!e.target.closest('.right-section')) {
    document.getElementById('dropdown').classList.remove('show');
  }
});

// ── Profile Modal ──
async function openProfileModal() {
  document.getElementById('dropdown').classList.remove('show');
  try {
    const resp = await fetch('/api/me', { headers: { 'Authorization': `Bearer ${TOKEN}` } });
    const json = await resp.json();
    if (json.code === 0 && json.data) {
      const d = json.data;
      document.getElementById('pfUsername').value = d.username || '';
      document.getElementById('pfEmployeeId').value = d.employee_id || '';
      document.getElementById('pfRole').value = d.role || '';
      document.getElementById('pfDept').value = d.department || '';
      document.getElementById('pfEmail').value = d.email || '';
      document.getElementById('pfStartDate').value = d.start_date || '';
    }
  } catch (e) { /* ignore */ }
  document.getElementById('profileModal').classList.add('show');
}

function closeProfileModal() {
  document.getElementById('profileModal').classList.remove('show');
}

async function saveProfile() {
  const body = {
    email: document.getElementById('pfEmail').value.trim() || null,
    department: document.getElementById('pfDept').value.trim() || null,
  };
  try {
    const resp = await fetch('/api/me', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
      body: JSON.stringify(body),
    });
    const json = await resp.json();
    if (json.code === 0) {
      closeProfileModal();
      showStatus('info', '个人信息已更新');
    }
  } catch (e) { showStatus('error', '保存失败'); }
}

// ── Password Modal ──
function openPasswordModal() {
  document.getElementById('dropdown').classList.remove('show');
  document.getElementById('pwOld').value = '';
  document.getElementById('pwNew').value = '';
  document.getElementById('pwConfirm').value = '';
  document.getElementById('pwMsg').className = 'status-msg';
  document.getElementById('pwMsg').textContent = '';
  document.getElementById('passwordModal').classList.add('show');
}

function closePasswordModal() {
  document.getElementById('passwordModal').classList.remove('show');
}

async function changePassword() {
  const oldPw = document.getElementById('pwOld').value;
  const newPw = document.getElementById('pwNew').value;
  const confirm = document.getElementById('pwConfirm').value;
  const msgEl = document.getElementById('pwMsg');

  if (!oldPw || !newPw) { msgEl.className = 'status-msg show error'; msgEl.textContent = '请填写所有字段'; return; }
  if (newPw.length < 6) { msgEl.className = 'status-msg show error'; msgEl.textContent = '新密码至少6位'; return; }
  if (newPw !== confirm) { msgEl.className = 'status-msg show error'; msgEl.textContent = '两次新密码不一致'; return; }

  try {
    const resp = await fetch('/api/me/password', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${TOKEN}` },
      body: JSON.stringify({ old_password: oldPw, new_password: newPw }),
    });
    const json = await resp.json();
    if (json.code === 0) {
      msgEl.className = 'status-msg show success'; msgEl.textContent = '密码修改成功';
      setTimeout(closePasswordModal, 1200);
    } else {
      msgEl.className = 'status-msg show error'; msgEl.textContent = json.msg || '修改失败';
    }
  } catch (e) { msgEl.className = 'status-msg show error'; msgEl.textContent = '网络异常'; }
}

// ── Logout ──
function logout() {
  localStorage.removeItem('token');
  localStorage.removeItem('username');
  localStorage.removeItem('employee_id');
  localStorage.removeItem('role');
  window.location.href = '/';
}

// ── Search ──
function searchByDate() {
  currentDate = document.getElementById('searchDate').value;
  currentPage = 1;
  loadReceipts();
}

function clearSearch() {
  document.getElementById('searchDate').value = '';
  currentDate = '';
  currentPage = 1;
  loadReceipts();
}

// ── Load Receipts ──
async function loadReceipts() {
  const listEl = document.getElementById('receiptList');
  const emptyEl = document.getElementById('emptyState');
  const pagEl = document.getElementById('pagination');

  listEl.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8;">⏳ 加载中...</div>';
  pagEl.style.display = 'none';
  emptyEl.style.display = 'none';
  hideStatus();

  let url = `/api/my-receipts?page=${currentPage}&page_size=${PAGE_SIZE}`;
  if (currentDate) {
    url += `&date=${encodeURIComponent(currentDate)}`;
  }

  try {
    const resp = await fetch(url, {
      headers: { 'Authorization': `Bearer ${TOKEN}` },
    });
    const json = await resp.json();

    if (!resp.ok || json.code !== 0) {
      showStatus('error', json.msg || '加载失败');
      listEl.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }

    const receipts = json.data || [];
    const total = json.total || 0;

    if (receipts.length === 0) {
      listEl.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }

    listEl.innerHTML = receipts.map((r, i) => renderCard(r, i)).join('');
    renderPagination(total);
  } catch (err) {
    showStatus('error', `网络异常：${err.message}`);
    listEl.innerHTML = '';
    emptyEl.style.display = 'block';
  }
}

// ── Render Card ──
function renderCard(r, idx) {
  const created = r.created_at ? r.created_at.slice(0, 10) : '-';
  const time = r.created_at ? r.created_at.slice(11, 16) : '';
  const merchant = r.merchant || '（未识别商户）';
  const typeLabel = r.expense_type || '其他';
  const amount = r.total_amount != null ? r.total_amount.toFixed(2) : '-.--';
  const ocrStatus = OCR_STATUS_MAP[r.status] || `状态${r.status}`;

  return `
    <div class="receipt-card" id="card-${idx}" onclick="toggleCard(${idx})">
      <div class="receipt-row">
        <div class="col-date">${created}<br><small>${time}</small></div>
        <div class="col-merchant">${escHtml(merchant)}</div>
        <div class="col-type">${escHtml(typeLabel)}</div>
        <div class="col-amount">¥${amount}</div>
        <div class="col-status">${statusBadge(r.approval_status)}</div>
        <div class="col-arrow">▼</div>
      </div>
      <div class="receipt-detail">
        <div class="detail-grid">
          <div class="detail-item">
            <span class="d-label">报销人</span>
            <span class="d-value">${escHtml(r.applicant || '-')}</span>
          </div>
          <div class="detail-item">
            <span class="d-label">参与人数</span>
            <span class="d-value">${r.head_count || 1} 人</span>
          </div>
          <div class="detail-item">
            <span class="d-label">报销类型</span>
            <span class="d-value">${escHtml(r.expense_type || '-')}</span>
          </div>
          <div class="detail-item">
            <span class="d-label">OCR 状态</span>
            <span class="d-value">${ocrStatus}</span>
          </div>
          <div class="detail-item">
            <span class="d-label">审批状态</span>
            <span class="d-value">${statusBadge(r.approval_status)}</span>
          </div>
          <div class="detail-item">
            <span class="d-label">任务 UUID</span>
            <span class="d-value" style="font-size:11px;font-family:monospace;">${r.uuid}</span>
          </div>
          ${r.error_message ? `
          <div class="detail-item full">
            <span class="d-label">错误信息</span>
            <span class="d-value" style="color:#dc2626;">${escHtml(r.error_message)}</span>
          </div>` : ''}
          ${r.ocr_raw_text ? `
          <div class="detail-item full">
            <span class="d-label">OCR 原始文本</span>
            <div class="ocr-raw">${escHtml(r.ocr_raw_text)}</div>
          </div>` : ''}
        </div>
      </div>
    </div>`;
}

function toggleCard(idx) {
  const card = document.getElementById('card-' + idx);
  if (!card) return;
  // Close all others
  document.querySelectorAll('.receipt-card.expanded').forEach(c => {
    if (c !== card) c.classList.remove('expanded');
  });
  card.classList.toggle('expanded');
}

// ── Pagination ──
function renderPagination(total) {
  const pagEl = document.getElementById('pagination');
  const totalPages = Math.ceil(total / PAGE_SIZE);
  if (totalPages <= 1) { pagEl.style.display = 'none'; return; }

  pagEl.style.display = 'flex';
  let html = '';
  html += `<button class="btn-page" onclick="goPage(${currentPage - 1})" ${currentPage <= 1 ? 'disabled' : ''}>‹ 上一页</button>`;

  const maxButtons = 5;
  let start = Math.max(1, currentPage - Math.floor(maxButtons / 2));
  let end = Math.min(totalPages, start + maxButtons - 1);
  if (end - start < maxButtons - 1) start = Math.max(1, end - maxButtons + 1);

  if (start > 1) {
    html += `<button class="btn-page" onclick="goPage(1)">1</button>`;
    if (start > 2) html += `<span class="page-info">...</span>`;
  }

  for (let p = start; p <= end; p++) {
    html += `<button class="btn-page ${p === currentPage ? 'active' : ''}" onclick="goPage(${p})">${p}</button>`;
  }

  if (end < totalPages) {
    if (end < totalPages - 1) html += `<span class="page-info">...</span>`;
    html += `<button class="btn-page" onclick="goPage(${totalPages})">${totalPages}</button>`;
  }

  html += `<button class="btn-page" onclick="goPage(${currentPage + 1})" ${currentPage >= totalPages ? 'disabled' : ''}>下一页 ›</button>`;
  pagEl.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  loadReceipts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Helpers ──
function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function showStatus(type, msg) {
  const el = document.getElementById('statusMsg');
  el.className = `status-msg show ${type}`;
  el.textContent = msg;
}
function hideStatus() {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg'; el.textContent = '';
}

// ── Init ──
loadReceipts();
</script>
</body>
</html>
